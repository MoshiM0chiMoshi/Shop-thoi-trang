<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/dangNhap.css">
    <title>Đăng Nhập</title>
</head>

<body>
    <main>
        <div class="login-container">
            <div class="left-side">
                <div class="left-content">
                    <div class="circle-icon">
                        <img src="../assets/img/dangnhapimg/Circle_Logo.svg" alt="">
                    </div>
                    <h2>Design with us</h2>
                    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Morbi lobortis maximus nunc, ac rhoncus
                        odio congue quis. Sed ac semper orci, eu porttitor lacus.</p>
                </div>

            </div>

            <div class="right-side">
                <div class="breadcrumb">
                    <span><strong><a href="">Trang chủ</a>
                            <strong>></strong>
                        </strong><strong> Đăng nhập</strong></span>
                </div>

                <div class="login-wrapper">
                    <h1>Đăng nhập</h1>

                    <form action="#" class="login-form">

                        <div class="form-group">
                            <label for="email">Địa chỉ email:</label>
                            <div>
                                <input type="email" id="email" class="form-control" placeholder=" ">
                            </div>

                        </div>

                        <div class="form-group">
                            <div class="password-header">
                                <label for="password">Mật khẩu:</label>
                                <button type="button" class="toggle-password">
                                    <img src="../assets/img/dangnhapimg/see.svg" alt="Hiện/Ẩn">

                                </button>
                            </div>
                            <input type="password" id="password" class="form-control" placeholder=" ">
                        </div>

                        <div class="forgot-password">
                            <a href="#">Quên mật khẩu?</a>
                        </div>

                        <button type="submit" class="btn-submit" disabled>Đăng nhập</button>
                    </form>

                    <div class="register-link">
                        <span>Chưa có tài khoản? <a href="#">Đăng ký ngay</a></span>
                    </div>

                    <div class="divider">
                        <span>Hoặc</span>
                    </div>

                    <div class="social-login">
                        <button class="btn-social btn-google">
                            <img src="../assets/img/dangnhapimg/logo_media logo.svg" alt="Google"> Tiếp tục với Google
                        </button>
                        <button class="btn-social btn-facebook">
                            <img src="../assets/img/dangnhapimg/facebook_media logo.png" alt="Facebook"> Tiếp tục với
                            Facebook
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </main>
</body>

</html>
